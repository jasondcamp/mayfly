# Example mayfly environment spec.
apiVersion: mayfly/v1alpha1
seed: example-1          # deterministic env name derives from this
# namespacePrefix: env   # namespace becomes env-<name>; omit for bare <name>
ttl: 24h                  # reaped after this (mayfly reap / the reaper CronJob)

# The AWS emulator deployed inside the environment's namespace. Omit for
# mayfly's pinned default (ministack, digest-pinned). Override image/version
# to pin your own.
emulator:
  kind: ministack        # ministack | floci
  # mayfly's patched ministack: adds the ALB data plane for instance/ip
  # targets (source: emulator/). Published multi-arch on ghcr.
  image: ghcr.io/jasondcamp/mayfly-ministack
  version: "0.1.3"

services:
  s3:
    buckets:
      - assets
      - uploads
      - cdn-public

  rds:
    - name: appdb
      engine: postgres   # postgres | mysql | mariadb
      dbName: app
      # backend: auto    # auto | emulator | native (auto: emulator on ministack)

  elasticache:
    - name: cache-a      # defaults: engine redis, version 7.2
    - name: cache-b
      engine: memcached  # redis | memcached (valkey: not yet in the emulator)
      version: "1.6"
    - name: cache-c
      engine: valkey     # needs the patched emulator image (like alb)
      version: "8.0"     # engine version selects the container image tag

  msk:
    - name: events       # native backend (no emulator supports MSK)
      topics: [orders, dragonfly]

  dynamodb:
    - name: sessions     # in-process in the emulator; hashKey defaults to "id"
    - name: carts
      hashKey: cartId

  secretsmanager:
    - name: app/api-key
      value: "test-key-123"     # literal fixture (test data, not prod creds)
    - name: app/signing-key
      generate: true            # random per environment; kept across re-ups

  alb:
    - name: hello-alb    # emulated ALB with a working data plane (patched
      targetApp: hello   # emulator image): http://aws:4566/_alb/hello-alb/

apps:
  # dragonfly: mayfly's connectivity verifier. Zero configuration — it
  # discovers every RDS/ElastiCache/MSK instance through the AWS control
  # plane (describe-* against the emulator, like a real AWS app) and
  # round-trips data through each. Readiness is /healthz, so the pod only
  # goes Ready once every discovered service verifies.
  dragonfly:
    image: ghcr.io/jasondcamp/mayfly-dragonfly:0.1.3
    port: 8080
    readiness: {path: /healthz, initialDelaySeconds: 3, periodSeconds: 10, timeoutSeconds: 30}
    resources: {memory: 64Mi, memoryLimit: 256Mi}
    ingress: {}   # http://dragonfly.<namespace>.localtest.me via the cluster's
                  # ingress controller; set host:/className: for real DNS (ALB etc.)

  # hello: minimal LB/ingress test app — shows which pod served the request
  # and echoes X-Forwarded-* headers. 2 replicas so balancing is visible.
  hello:
    image: ghcr.io/jasondcamp/mayfly-hello:0.1.3
    port: 8080
    replicas: 2
    readiness: {path: /healthz}
    ingress: {}   # http://hello.<namespace>.localtest.me locally; for ALB:
    # ingress: {host: hello.env.example.com, className: alb}

  # pgbouncer in front of the RDS postgres (prod runs it on EC2; here it's a
  # container). DATABASE_URL from the rds-appdb secret is all it needs; apps
  # that should pool point their DATABASE_URL at pgbouncer:5432 instead.
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    port: 5432
    servicePort: 5432          # protocol-native Service port -> pgbouncer:5432
    secrets: [rds-appdb]
    env: {POOL_MODE: transaction, AUTH_TYPE: scram-sha-256}
    readiness: {tcp: true}     # not an HTTP app

  echo:
    image: ealen/echo-server:latest
    port: 80
    secrets: [rds-appdb, elasticache-cache-a]   # env-from these provisioned secrets
    readiness: {path: /}
    # Everything an app supports:
    # command: ["/bin/server"]        # override image entrypoint
    # args: ["--verbose"]
    # replicas: 2
    # env: {LOG_LEVEL: debug}
    # resources: {cpu: 100m, memory: 128Mi, memoryLimit: 512Mi, cpuLimit: "1"}
    # readiness: {path: /healthz, port: 3000, initialDelaySeconds: 5, periodSeconds: 5}
    # imagePullSecret: regcred        # copied into the env namespace at `up`
    #                                 # (from --pull-secret-namespace, default "default")
    # patch:                          # escape hatch: deep-merged onto the generated
    #   spec:                         # Deployment (named lists merge by name; mayfly
    #     template:                   # re-asserts selector/labels/enableServiceLinks)
    #       spec:
    #         tolerations: [{key: gpu, operator: Exists}]
